name: Noctua CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    name: "Lint, Typecheck & Test"
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Linter
        run: npm run lint
        continue-on-error: false

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: false

      - name: Running Tests
        run: npm test

  deploy:
    name: "Deploy Stage"
    needs: quality-gate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Placeholder
        run: |
          echo "CI Quality Gate passed successfully."
          echo "Aguardando definição de infra de produção (SSH/Docker/Heroku/etc) para deploy automático."
